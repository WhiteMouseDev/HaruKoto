name: harukoto_mobile
description: "하루코토 - 일본어 학습 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Existing
  webview_flutter: ^4.13.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.2.3
  google_sign_in: ^6.2.2

  # State Management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Auth & Storage
  supabase_flutter: ^2.8.0
  flutter_secure_storage: ^9.2.0

  # Routing
  go_router: ^14.6.0

  # Monitoring
  sentry_flutter: ^8.12.0

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  shared_preferences: ^2.3.0

  # UI
  google_fonts: ^6.2.0
  lucide_icons: ^0.257.0
  widgetbook: ^3.22.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  riverpod_generator: ^3.0.0
  build_runner: ^2.4.0
  riverpod_lint: ^3.0.0
  custom_lint: ^0.8.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/logo-wordmark.svg
