name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================
  # Detect changes
  # ============================
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/admin/**'
              - 'apps/landing/**'
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            backend:
              - 'apps/api/**'
              - 'packages/database/**'
            mobile:
              - 'apps/mobile/**'

  # ============================
  # Frontend (Next.js / Turborepo)
  # ============================
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_KAKAO_JS_KEY: placeholder
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder
          NEXT_PUBLIC_PORTONE_STORE_ID: placeholder
          NEXT_PUBLIC_GA_ID: G-PLACEHOLDER
          NEXT_PUBLIC_SENTRY_DSN: ''

  # ============================
  # Backend (FastAPI)
  # ============================
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check app/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          SUPABASE_URL: https://test.supabase.co

  # ============================
  # API Contract Check (OpenAPI breaking changes)
  # ============================
  api-contract:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: apps/api

      - name: Check OpenAPI snapshot freshness
        working-directory: apps/api
        run: |
          cp openapi/openapi.json /tmp/committed-openapi.json
          uv run python scripts/export_openapi.py
          if ! diff -q /tmp/committed-openapi.json openapi/openapi.json > /dev/null; then
            echo "::error::openapi.json is stale — regenerate it locally and commit."
            echo ""
            echo "Fix:"
            echo "  cd apps/api && uv run python scripts/export_openapi.py"
            echo "  git add apps/api/openapi/openapi.json && git commit"
            echo ""
            echo "Diff preview (committed → current code):"
            diff /tmp/committed-openapi.json openapi/openapi.json | head -100 || true
            exit 1
          fi

      - name: Load base OpenAPI from main
        run: |
          git show origin/main:apps/api/openapi/openapi.json > apps/api/openapi/base-openapi.json 2>/dev/null || echo '{}' > apps/api/openapi/base-openapi.json

      - name: Check breaking changes (oasdiff)
        # TODO: warning 모드 안정화 후 continue-on-error 제거
        continue-on-error: true
        uses: docker://tufin/oasdiff:latest
        with:
          args: breaking apps/api/openapi/base-openapi.json apps/api/openapi/openapi.json

  # ============================
  # Schema Drift Check (Alembic ↔ Prisma)
  # ============================
  schema-drift:
    needs: changes
    if: >
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harukoto_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install API dependencies
        run: uv sync --frozen --extra dev
        working-directory: apps/api

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Alembic migrations (single DDL authority)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/harukoto_ci
        run: uv run alembic upgrade head

      - name: Check Prisma schema drift
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/harukoto_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/harukoto_ci
        run: |
          pnpm exec prisma migrate diff \
            --exit-code \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma

  # ============================
  # Mobile (Flutter)
  # ============================
  mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            apps/mobile/.dart_tool
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('apps/mobile/pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=https://placeholder.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=placeholder \
            --dart-define=API_BASE_URL=https://placeholder.api.com \
            --dart-define=SENTRY_DSN=
